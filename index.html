<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpenseFlex - Modern Expense Tracker</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #6366f1;
            --primary-dark: #4f46e5;
            --secondary-color: #f1f5f9;
            --accent-color: #10b981;
            --danger-color: #ef4444;
            --warning-color: #f59e0b;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --bg-primary: #ffffff;
            --bg-secondary: #f8fafc;
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --radius-sm: 0.375rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
        }

        @keyframes shake { /* danger shake style */
  0% { transform: translateX(0); }
  25% { transform: translateX(-3px); }
  50% { transform: translateX(3px); }
  75% { transform: translateX(-3px); }
  100% { transform: translateX(0); }
        }

        [data-theme="dark"] {
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --border-color: #334155;
            --secondary-color: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            line-height: 1.6;
            transition: all 0.3s ease;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem;
        }

        .header {
            background: var(--bg-primary);
            padding: 1.5rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            margin-bottom: 2rem;
            position: relative;
        }

        .header h1 {
            font-size: 1.875rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .theme-toggle {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: var(--secondary-color);
            border: none;
            padding: 0.5rem;
            border-radius: var(--radius-md);
            cursor: pointer;
            color: var(--text-primary);
            transition: all 0.2s ease;
        }

        .theme-toggle:hover {
            transform: scale(1.05);
            box-shadow: var(--shadow-md);
        }

        .card {
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            margin-bottom: 1.5rem;
            overflow: hidden;
        }

        .card-header {
            padding: 1.5rem 1.5rem 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .card-header h2 {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card-content {
            padding: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-primary);
            font-size: 0.875rem;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.2s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        textarea.form-input {
            resize: vertical;
            min-height: 80px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
        }

        .expense-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 1.25rem;
            margin-bottom: 1rem;
            position: relative;
            transition: all 0.2s ease;
        }

        .expense-item:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-1px);
        }

        .expense-number {
            position: absolute;
            top: -10px;
            left: 15px;
            background: var(--primary-color);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: var(--radius-sm);
            font-size: 0.75rem;
            font-weight: 600;
        }

        .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--danger-color);
            color: white;
            border: none;
            padding: 0.375rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.2s ease;
        }

        .delete-btn:hover {
            background: #dc2626;
            transform: scale(1.05);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
            justify-content: center;
            min-height: 44px;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .btn-secondary {
            background: var(--secondary-color);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--border-color);
            transform: translateY(-1px);
        }

        .btn-success {
            background: var(--accent-color);
            color: white;
        }

        .btn-success:hover {
            background: #059669;
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .btn-danger:hover { /* danger shake */
            animation: shake 0.3s ease-in-out;
            box-shadow: var(--shadow-md);
            
        }

        .btn-warning {
            background: var(--warning-color);
            color: white;
        }

        .btn-warning:hover {
            background: #d97706;
        }

        .btn-danger {
            background-color: var(--danger-color);
            color: white;
        }

        .btn-danger:hover {
            background-color: #dc2626; /* a darker red for hover */
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-top: 1.5rem;
        }

        @media (max-width: 640px) {
            .btn-group {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
            }
        }

        .total-display {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            color: white;
            padding: 1.5rem;
            border-radius: var(--radius-lg);
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .total-display h3 {
            font-size: 0.875rem;
            font-weight: 500;
            opacity: 0.9;
            margin-bottom: 0.5rem;
        }

        .total-amount {
            font-size: 2rem;
            font-weight: 700;
        }

        .output-section {
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            margin-top: 1.5rem;
        }

        .output-content {
            background: #1e293b;
            color: #e2e8f0;
            padding: 1rem;
            border-radius: var(--radius-md);
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
            white-space: pre;
            overflow-x: auto;
            max-height: 400px;
            overflow-y: auto;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .expense-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .summary-card {
            background: var(--bg-secondary);
            padding: 1rem;
            border-radius: var(--radius-md);
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .summary-card h4 {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .summary-card .value {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .loading {
            opacity: 0.6;
            pointer-events: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .expense-item {
            animation: fadeIn 0.3s ease;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--accent-color);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            z-index: 1000;
            transform: translateX(400px);
            transition: transform 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            max-width: 300px;
        }

        .notification.show {
            transform: translateX(0);
        }

        @media (max-width: 640px) {
            .container {
                padding: 0.5rem;
            }
            
            .header {
                padding: 1rem;
                margin-bottom: 1rem;
            }
            
            .header h1 {
                font-size: 1.5rem;
            }
            
            .theme-toggle {
                top: 1rem;
                right: 1rem;
            }
            
            .card-content {
                padding: 1rem;
            }
            
            .expense-item {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
                <i class="fas fa-moon" id="theme-icon"></i>
            </button>
            <h1>
                <i class="fas fa-receipt"></i>
                ExpenseFlexV2
            </h1>
            <p>Modern expense tracking and reporting made simple</p>
        </div>

        <div class="card">
            <div class="card-header">
                <h2>
                    <i class="fas fa-info-circle"></i>
                    Report Details
                </h2>
            </div>
            <div class="card-content">
                <input type="hidden" id="currency" value="USD">
                
                <div class="form-group">
                    <label for="purpose">
                        <i class="fas fa-align-left"></i>
                        Purpose of Expense Report
                    </label>
                    <input type="text" id="purpose" class="form-input" placeholder="Describe the purpose of these expenses...">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="globalProject">
                            <i class="fas fa-folder"></i>
                            Default Project #
                        </label>
                        <input type="text" id="globalProject" class="form-input" placeholder="Enter project number">
                    </div>
                    <div class="form-group">
                        <label for="globalTask">
                            <i class="fas fa-tasks"></i>
                            Default Task #
                        </label>
                        <input type="text" id="globalTask" class="form-input" placeholder="Enter task number">
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h2>
                <button class="btn btn-primary" onclick="addExpenseItem(); focusLastStartDate();">
                    <i class="fas fa-plus"></i>
                    Add New Expense
                </h2>
            </div>
            <div class="card-content">
                <div id="expenseContainer"></div>
                
                <div class="empty-state" id="emptyState">
                    <i class="fas fa-receipt"></i>
                    <h3>No expenses added yet</h3>
                    <p>Click "Add New Expense" to get started</p>
                </div>

                <button class="btn btn-primary" onclick="addExpenseItem(); focusLastStartDate();">
                    <i class="fas fa-plus"></i>
                    Add New Expense
                </button>
            </div>
        </div>

        <div id="summarySection" style="display: none;">
            <div class="total-display">
                <h3>Total Amount</h3>
                <div class="total-amount" id="totalAmount">$0.00</div>
            </div>

            <div class="expense-summary">
                <div class="summary-card">
                    <h4>Total Items</h4>
                    <div class="value" id="itemCount">0</div>
                </div>
                <div class="summary-card">
                    <h4>Currency</h4>
                    <div class="value">USD</div>
                </div>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn btn-success" onclick="generateAndCopy()">
                <i class="fas fa-file-export"></i>
                Generate & Copy Report
            </button>
            <button class="btn btn-primary" onclick="downloadReport()">
                <i class="fas fa-download"></i>
                Download Report
            </button>
            <button class="btn btn-warning" onclick="saveDraft()">
                <i class="fas fa-save"></i>
                Save Draft
            </button>
            <button class="btn btn-secondary" onclick="loadDraft()">
                <i class="fas fa-folder-open"></i>
                Load Draft
            </button>
            <button class="btn btn-secondary" onclick="importReport()">
                <i class="fas fa-file-import"></i>
                Import Report
            </button>
            <!-- button class="btn btn-secondary" onclick="resetForm()">
                <i class="fas fa-refresh"></i>
                Reset Form
            </button -->
            <button class="btn btn-danger" onclick="clearDraft()">
                <i class="fas fa-trash-alt"></i>
                Clear Saved Draft
            </button>
        </div>

        <!-- Hidden file input for import -->
        <input type="file" id="fileInput" accept=".txt" style="display: none;">

        <div class="output-section" id="outputSection" style="display: none;">
            <h3 style="margin-bottom: 1rem;">
                <i class="fas fa-code"></i>
                Generated Report
            </h3>
            <div class="output-content" id="outputContent"></div>
        </div>
    </div>

    <script>
        const costCenter = atob('MTAyNDE=');
        const template = atob('U0lUQSBVUyBJTkMgVEVNUExBVEU=');
        let expenseCount = 0;

        // Theme management
        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('theme-icon');
            const currentTheme = body.getAttribute('data-theme');
            
            if (currentTheme === 'dark') {
                body.setAttribute('data-theme', 'light');
                icon.className = 'fas fa-moon';
                localStorage.setItem('theme', 'light');
            } else {
                body.setAttribute('data-theme', 'dark');
                icon.className = 'fas fa-sun';
                localStorage.setItem('theme', 'dark');
            }
        }

        // Load saved theme
        function loadTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            const body = document.body;
            const icon = document.getElementById('theme-icon');
            
            body.setAttribute('data-theme', savedTheme);
            icon.className = savedTheme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
        }

        function formatDate(input) {
            if (!input) return '';
            const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun",
                          "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            const [year, month, day] = input.split("-");
            return `${parseInt(day)}-${months[parseInt(month) - 1]}-${year}`;
        }

        function addExpenseItem(data = []) {
            expenseCount++;
            const container = document.getElementById('expenseContainer');
            const emptyState = document.getElementById('emptyState');
            
            emptyState.style.display = 'none';
            
            const expenseDiv = document.createElement('div');
            expenseDiv.className = 'expense-item';
            expenseDiv.innerHTML = `
                <div class="expense-number">${expenseCount}</div>
                <button class="delete-btn" onclick="removeExpenseItem(this)" title="Delete expense">
                    <i class="fas fa-trash"></i>
                </button>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Start Date</label>
                        <input type="date" class="form-input expense-date" value="${data[0] || ''}">
                    </div>
                    
                        
                        <input type="hidden" class="form-input expense-days" value="${data[1] || '1'}" min="1">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Receipt Amount ($)</label>
                        <input type="number" step="0.01" class="form-input expense-amount" value="${data[2] || ''}" placeholder="0.00" oninput="updateSummary()">
                    </div>
                    <div class="form-group">
                        <label>Expense Type</label>
                        <input type="text" class="form-input expense-type" value="${data[3] || 'Meals'}" placeholder="Meals, Travel, etc.">
                    </div>
                </div>
                
                <input type="hidden" class="expense-project" value="${data[4] || document.getElementById('globalProject').value || ''}">
                <input type="hidden" class="expense-task" value="${data[5] || document.getElementById('globalTask').value || ''}">
                
                <div class="form-group">
                    <label>Justification</label>
                    <input type="text" class="form-input expense-justification" value="${data[6] || ''}" placeholder="Reason for this expense" onkeydown="handleTabToAddRow(event)">
                </div>
                
                <input type="hidden" class="expense-additional" value="${data[7] || ''}">
            `;
            
            container.appendChild(expenseDiv);
            updateSummary();
        }

        function removeExpenseItem(button) {
            const expenseItem = button.closest('.expense-item');
            expenseItem.remove();
            renumberExpenses();
            updateSummary();
            
            const container = document.getElementById('expenseContainer');
            const emptyState = document.getElementById('emptyState');
            
            if (container.children.length === 0) {
                emptyState.style.display = 'block';
                document.getElementById('summarySection').style.display = 'none';
                expenseCount = 0;
            }
        }

        function renumberExpenses() {
            const expenses = document.querySelectorAll('.expense-item');
            expenses.forEach((expense, index) => {
                expense.querySelector('.expense-number').textContent = index + 1;
            });
            expenseCount = expenses.length;
        }

        function updateSummary() {
            const expenses = document.querySelectorAll('.expense-item');
            let total = 0;
            
            expenses.forEach(expense => {
                const amount = parseFloat(expense.querySelector('.expense-amount').value) || 0;
                total += amount;
            });
            
            document.getElementById('totalAmount').textContent = `$${total.toFixed(2)}`;
            document.getElementById('itemCount').textContent = expenses.length;
            
            const summarySection = document.getElementById('summarySection');
            summarySection.style.display = expenses.length > 0 ? 'block' : 'none';
        }

        function generateAndCopy() {
            const currency = document.getElementById('currency').value;
            const purpose = document.getElementById('purpose').value;
            const approver = '';

            const expenses = document.querySelectorAll('.expense-item');
            let total = 0;
            let lines = [];
            
            expenses.forEach((expense, i) => {
                const date = expense.querySelector('.expense-date').value;
                const days = expense.querySelector('.expense-days').value || '';
                const amount = parseFloat(expense.querySelector('.expense-amount').value) || 0;
                const type = expense.querySelector('.expense-type').value || '';
                const project = expense.querySelector('.expense-project').value || '';
                const task = expense.querySelector('.expense-task').value || '';
                const justification = expense.querySelector('.expense-justification').value || '';
                const additional = expense.querySelector('.expense-additional').value || '';
                
                total += amount;
                lines.push(`${i + 1}\t${formatDate(date)}\t${days}\t\t${amount.toFixed(2)}\t${currency}\t1.\t${amount.toFixed(2)}\t${type}\t${project}\t${task}\t\t${justification}\t${additional}`);
            });

            let header = `\t\t\t\t\tExpense Report\n\t\tExpense Cost Center\t${costCenter}\n\t\tReimbursement Currency\t${currency}\n\t\tPurpose\t${purpose}\n\t\tExpense Template\t${template}\n\t\tApprover\t${approver}\n\t\tTotal\t\t\t\t${total.toFixed(2)}\nLine\tStart Date\tDays\tDaily Rate\tReceipt Amount\tReceipt Currency\tExchange Rate\tReimbursable Amount\tExpense Type\tProject Number\tTask Number\tReceipt Missing\tJustification\tAdditional Information`;

            let body = lines.join('\n');
            let footer = `\n\t\t\t\t\tTotal\t${total.toFixed(2)}`;

            const result = `${header}\n${body}${footer}`;
            
            document.getElementById('outputContent').textContent = result;
            document.getElementById('outputSection').style.display = 'block';

            // Copy to clipboard
            navigator.clipboard.writeText(result).then(() => {
                showNotification('Report generated and copied to clipboard!');
            });
        }

        function resetForm() {
            document.getElementById('purpose').value = '';
            document.getElementById('globalProject').value = '';
            document.getElementById('globalTask').value = '';
            document.getElementById('expenseContainer').innerHTML = '';
            document.getElementById('outputContent').textContent = '';
            document.getElementById('outputSection').style.display = 'none';
            document.getElementById('summarySection').style.display = 'none';
            document.getElementById('emptyState').style.display = 'block';
            expenseCount = 0;
        }

        function saveDraft() {
            const header = {
                purpose: document.getElementById('purpose').value,
                project: document.getElementById('globalProject').value,
                task: document.getElementById('globalTask').value
            };

            const expenses = document.querySelectorAll('.expense-item');
            const lines = [];
            
            expenses.forEach(expense => {
                const inputs = expense.querySelectorAll('input');
                lines.push(Array.from(inputs).map(input => input.value));
            });

            const draft = { header, lines };
            localStorage.setItem('expenseReportDraft', JSON.stringify(draft));
            showNotification('Draft saved successfully!');
        }

        function loadDraft() {
            const saved = localStorage.getItem('expenseReportDraft');
            if (!saved) {
                showNotification('No saved draft found.', 'warning');
                return;
            }
            
            const { header, lines } = JSON.parse(saved);

            document.getElementById('purpose').value = header.purpose || '';
            document.getElementById('globalProject').value = header.project || '';
            document.getElementById('globalTask').value = header.task || '';

            // Clear existing expenses
            document.getElementById('expenseContainer').innerHTML = '';
            expenseCount = 0;
            
            // Add saved expenses
            lines.forEach(line => addExpenseItem(line));
            
            showNotification('Draft loaded successfully!');
        }

        function clearDraft() {
            localStorage.removeItem('expenseReportDraft');
            showNotification('Saved draft cleared!');
        }

        function importReport() {
            document.getElementById('fileInput').click();
        }

        function reverseFormatDate(dateStr) {
            if (!dateStr) return '';
            const parts = dateStr.split("-");
            if (parts.length !== 3) return '';
            
            const [day, monthName, year] = parts;
            const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
            const monthIndex = months.indexOf(monthName);
            
            if (monthIndex === -1) return '';
            
            const month = (monthIndex + 1).toString().padStart(2, "0");
            const paddedDay = day.padStart(2, "0");
            
            return `${year}-${month}-${paddedDay}`;
        }

        function showNotification(message, type = 'success') {
            const notification = document.createElement('div');
            notification.className = 'notification';
            
            let iconClass = 'check-circle';
            if (type === 'warning') iconClass = 'exclamation-triangle';
            if (type === 'info') iconClass = 'info-circle';
            
            notification.innerHTML = `
                <i class="fas fa-${iconClass}"></i>
                ${message}
            `;
            
            document.body.appendChild(notification);
            
            setTimeout(() => notification.classList.add('show'), 100);
            setTimeout(() => {
                notification.classList.remove('show');
                setTimeout(() => notification.remove(), 300);
            }, type === 'info' ? 5000 : 3000); // Show info notifications longer
        }

        // New functions from your updated code
        function handleTabToAddRow(e) {
            if (e.key === 'Tab' && !e.shiftKey) {
                const expenseItem = e.target.closest('.expense-item');
                const allExpenses = document.querySelectorAll('.expense-item');
                const isLastExpense = expenseItem === allExpenses[allExpenses.length - 1];
                
                if (isLastExpense) {
                    setTimeout(() => {
                        addExpenseItem();
                        focusLastStartDate();
                    }, 0);
                }
            }
        }

        function focusLastStartDate() {
            const expenses = document.querySelectorAll('.expense-item');
            if (expenses.length > 0) {
                const lastExpense = expenses[expenses.length - 1];
                const startDateInput = lastExpense.querySelector('.expense-date');
                if (startDateInput) {
                    startDateInput.focus();
                }
            }
        }

        function downloadReport() {
            generateAndCopy(false);
            const purpose = document.getElementById('purpose').value.trim().substring(0, 3) || 'EXP';
            const project = document.getElementById('globalProject').value.trim() || '0000';
            const now = new Date();
            const dateStr = now.toLocaleString('en-US', {
                month: 'short',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                hour12: false
            }).replace(/\W+/g, '-');

            const filename = `${purpose}-${project}-${dateStr}.txt`;
            const content = document.getElementById('outputContent').textContent || 'No content generated yet.';
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }

        // Initialize app
        document.addEventListener('DOMContentLoaded', function() {
            loadTheme();
            checkForSavedDraft();
            updateSummary();
            
            // Set up file input listener for import
            document.getElementById('fileInput').addEventListener('change', function() {
                const file = this.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const content = e.target.result.split('\n');
                        const headerData = {};

                        // Parse header information
                        content.forEach(line => {
                            const parts = line.trim().split('\t');
                            if (parts.length >= 2) {
                                if (parts[0] === 'Purpose') headerData.purpose = parts[1] || '';
                                if (parts[0] === 'Expense Cost Center') headerData.costCenter = parts[1] || '';
                            }
                        });

                        // Clear existing form
                        resetForm();

                        // Set header values
                        document.getElementById('purpose').value = headerData.purpose || '';

                        // Find the start of expense data (line starting with "Line\t")
                        const headerIndex = content.findIndex(line => line.startsWith('Line\t'));
                        if (headerIndex >= 0) {
                            // Process expense lines starting after the header
                            for (let i = headerIndex + 1; i < content.length; i++) {
                                const line = content[i].trim();
                                if (!line || line.startsWith('Total')) continue;
                                
                                const cols = line.split('\t');
                                if (cols.length >= 13) {
                                    // Extract data from columns
                                    const lineNum = cols[0];
                                    const startDate = cols[1];
                                    const days = cols[2];
                                    const receiptAmount = cols[4];
                                    const expenseType = cols[8];
                                    const projectNum = cols[9];
                                    const taskNum = cols[10];
                                    const justification = cols[12];
                                    const additionalInfo = cols[13] || '';

                                    // Set global project/task from first expense if not already set
                                    if (lineNum === '1') {
                                        if (projectNum && !document.getElementById('globalProject').value) {
                                            document.getElementById('globalProject').value = projectNum;
                                        }
                                        if (taskNum && !document.getElementById('globalTask').value) {
                                            document.getElementById('globalTask').value = taskNum;
                                        }
                                    }

                                    // Add expense item with imported data
                                    addExpenseItem([
                                        reverseFormatDate(startDate), // Start Date (convert back to YYYY-MM-DD)
                                        days,                         // Days
                                        receiptAmount,                // Receipt Amount
                                        expenseType,                  // Expense Type
                                        projectNum,                   // Project #
                                        taskNum,                      // Task #
                                        justification,                // Justification
                                        additionalInfo                // Additional Info
                                    ]);
                                }
                            }
                        }

                        showNotification('Report imported successfully!');
                        updateSummary();
                        
                    } catch (error) {
                        console.error('Import error:', error);
                        showNotification('Error importing file. Please check the file format.', 'warning');
                    }
                };
                reader.readAsText(file);
                
                // Clear the file input so the same file can be imported again
                this.value = '';
            });
        });

        function checkForSavedDraft() {
            const saved = localStorage.getItem('expenseReportDraft');
            if (saved) {
                showNotification('Saved draft found! Click "Load Draft" to restore your data.', 'info');
            }
        }

        // Update project/task fields when global values change
        document.getElementById('globalProject').addEventListener('input', function(e) {
            document.querySelectorAll('.expense-project').forEach(input => {
                if (!input.value) input.value = e.target.value;
            });
        });

        document.getElementById('globalTask').addEventListener('input', function(e) {
            document.querySelectorAll('.expense-task').forEach(input => {
                if (!input.value) input.value = e.target.value;
            });
        });
		
		//Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker
      .register('service-worker.js')
      .then(() => console.log('Service Worker registered'))
      .catch((error) => console.error('Service Worker registration failed:', error));
  }


    </script>

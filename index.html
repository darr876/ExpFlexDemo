<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Report App</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide-react@latest/dist/umd/lucide-react.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useCallback } = React;
    const { Copy, Plus, Trash2, Save, Upload, RotateCcw } = lucideReact;

    const ExpenseReportApp = () => {
      const [purpose, setPurpose] = useState('');
      const [globalProject, setGlobalProject] = useState('');
      const [globalTask, setGlobalTask] = useState('');
      const [expenseLines, setExpenseLines] = useState([]);
      const [output, setOutput] = useState('');
      const [savedDraft, setSavedDraft] = useState(null);
      const [showOutput, setShowOutput] = useState(false);

      const formatDate = (dateString) => {
        if (!dateString) return '';
        const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun",
                        "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        const [year, month, day] = dateString.split("-");
        return `${parseInt(day)}-${months[parseInt(month) - 1]}-${year}`;
      };

      const addExpenseLine = useCallback(() => {
        const newLine = {
          id: Date.now(),
          startDate: '',
          days: 1,
          amount: '',
          project: globalProject,
          task: globalTask,
          justification: '',
          additionalInfo: ''
        };
        setExpenseLines(prev => [...prev, newLine]);
      }, [globalProject, globalTask]);

      const updateExpenseLine = (id, field, value) => {
        setExpenseLines(prev => 
          prev.map(line => 
            line.id === id ? { ...line, [field]: value } : line
          )
        );
      };

      const deleteExpenseLine = (id) => {
        setExpenseLines(prev => prev.filter(line => line.id !== id));
      };

      const calculateTotal = () => {
        return expenseLines.reduce((total, line) => {
          return total + (parseFloat(line.amount) || 0);
        }, 0);
      };

      const generateOutput = async () => {
        const costCenter = "10241";
        const currency = "USD";
        const template = "SITA US INC TEMPLATE";
        const approver = "";
        
        const total = calculateTotal();
        const lines = expenseLines.map((line, index) => {
          const amount = parseFloat(line.amount) || 0;
          return `${index + 1}\t${formatDate(line.startDate)}\t${line.days || ''}\t\t${amount.toFixed(2)}\t${currency}\t1.\t${amount.toFixed(2)}\tMeals\t${line.project || ''}\t${line.task || ''}\t\t${line.justification || ''}\t${line.additionalInfo || ''}`;
        });

        const header = `\t\t\t\tExpense Report\n\t\tExpense Cost Center\t${costCenter}\n\t\tReimbursement Currency\t${currency}\n\t\tPurpose\t${purpose}\n\t\tExpense Template\t${template}\n\t\tApprover\t${approver}\n\t\tTotal\t\t\t\t${total.toFixed(2)}\nLine\tStart Date\tDays\tDaily Rate\tReceipt Amount\tReceipt Currency\tExchange Rate\tReimbursable Amount\tExpense Type\tProject Number\tTask Number\tReceipt Missing\tJustification\tAdditional Information`;

        const body = lines.join('\n');
        const footer = `\n\t\t\t\tTotal\t${total.toFixed(2)}`;

        const result = `${header}\n${body}${footer}`;
        setOutput(result);
        setShowOutput(true);

        try {
          await navigator.clipboard.writeText(result);
        } catch (err) {
          console.log('Clipboard write failed, but output is generated');
        }
      };

      const resetForm = () => {
        setPurpose('');
        setGlobalProject('');
        setGlobalTask('');
        setExpenseLines([]);
        setOutput('');
        setShowOutput(false);
      };

      const saveDraft = () => {
        const draft = {
          purpose,
          globalProject,
          globalTask,
          expenseLines: expenseLines.map(line => ({
            startDate: line.startDate,
            days: line.days,
            amount: line.amount,
            project: line.project,
            task: line.task,
            justification: line.justification,
            additionalInfo: line.additionalInfo
          }))
        };
        setSavedDraft(draft);
      };

      const loadDraft = () => {
        if (!savedDraft) return;
        
        setPurpose(savedDraft.purpose || '');
        setGlobalProject(savedDraft.globalProject || '');
        setGlobalTask(savedDraft.globalTask || '');
        
        const restoredLines = savedDraft.expenseLines.map(line => ({
          ...line,
          id: Date.now() + Math.random()
        }));
        setExpenseLines(restoredLines);
      };

      const clearDraft = () => {
        setSavedDraft(null);
      };

      const total = calculateTotal();

      return React.createElement('div', { className: "min-h-screen bg-gray-50" },
        React.createElement('div', { className: "max-w-6xl mx-auto p-4 sm:p-6 lg:p-8" },
          // Header
          React.createElement('div', { className: "bg-white rounded-xl shadow-sm border border-gray-200 mb-6" },
            React.createElement('div', { className: "px-6 py-5 border-b border-gray-200" },
              React.createElement('h1', { className: "text-2xl font-semibold text-gray-900" }, "Expense Report"),
              React.createElement('p', { className: "text-sm text-gray-600 mt-1" }, "Create and submit your expense report")
            ),
            
            React.createElement('div', { className: "px-6 py-5 space-y-4" },
              React.createElement('div', null,
                React.createElement('label', { className: "block text-sm font-medium text-gray-700 mb-1" }, "Purpose"),
                React.createElement('textarea', {
                  value: purpose,
                  onChange: (e) => setPurpose(e.target.value),
                  className: "w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none",
                  rows: 3,
                  placeholder: "Enter the purpose of your expenses..."
                })
              ),
              
              React.createElement('div', { className: "grid grid-cols-1 md:grid-cols-2 gap-4" },
                React.createElement('div', null,
                  React.createElement('label', { className: "block text-sm font-medium text-gray-700 mb-1" }, "Project #"),
                  React.createElement('input', {
                    type: "text",
                    value: globalProject,
                    onChange: (e) => setGlobalProject(e.target.value),
                    className: "w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent",
                    placeholder: "Enter project number..."
                  })
                ),
                
                React.createElement('div', null,
                  React.createElement('label', { className: "block text-sm font-medium text-gray-700 mb-1" }, "Task #"),
                  React.createElement('input', {
                    type: "text",
                    value: globalTask,
                    onChange: (e) => setGlobalTask(e.target.value),
                    className: "w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent",
                    placeholder: "Enter task number..."
                  })
                )
              )
            )
          ),

          // Expense Lines
          React.createElement('div', { className: "bg-white rounded-xl shadow-sm border border-gray-200 mb-6" },
            React.createElement('div', { className: "px-6 py-4 border-b border-gray-200 flex items-center justify-between" },
              React.createElement('div', null,
                React.createElement('h2', { className: "text-lg font-semibold text-gray-900" }, "Expense Lines"),
                React.createElement('p', { className: "text-sm text-gray-600" }, `Total: $${total.toFixed(2)}`)
              ),
              React.createElement('button', {
                onClick: addExpenseLine,
                className: "inline-flex items-center px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors"
              },
                React.createElement(Plus, { size: 16, className: "mr-2" }),
                "Add Line"
              )
            ),
            
            React.createElement('div', { className: "overflow-x-auto" },
              React.createElement('table', { className: "w-full" },
                React.createElement('thead', { className: "bg-gray-50" },
                  React.createElement('tr', null,
                    React.createElement('th', { className: "px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider" }, "#"),
                    React.createElement('th', { className: "px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider" }, "Date"),
                    React.createElement('th', { className: "px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider hidden md:table-cell" }, "Days"),
                    React.createElement('th', { className: "px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider" }, "Amount"),
                    React.createElement('th', { className: "px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider" }, "Type"),
                    React.createElement('th', { className: "px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider hidden lg:table-cell" }, "Project"),
                    React.createElement('th', { className: "px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider hidden lg:table-cell" }, "Task"),
                    React.createElement('th', { className: "px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider" }, "Justification"),
                    React.createElement('th', { className: "px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider hidden md:table-cell" }, "Additional Info"),
                    React.createElement('th', { className: "px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider" }, "Action")
                  )
                ),
                React.createElement('tbody', { className: "bg-white divide-y divide-gray-200" },
                  expenseLines.map((line, index) =>
                    React.createElement('tr', { key: line.id, className: "hover:bg-gray-50" },
                      React.createElement('td', { className: "px-4 py-3 text-sm text-gray-900" }, index + 1),
                      React.createElement('td', { className: "px-4 py-3" },
                        React.createElement('input', {
                          type: "date",
                          value: line.startDate,
                          onChange: (e) => updateExpenseLine(line.id, 'startDate', e.target.value),
                          className: "w-full px-2 py-1 border border-gray-300 rounded focus:ring-1 focus:ring-blue-500 focus:border-transparent text-sm"
                        })
                      ),
                      React.createElement('td', { className: "px-4 py-3 hidden md:table-cell" },
                        React.createElement('input', {
                          type: "number",
                          value: line.days,
                          onChange: (e) => updateExpenseLine(line.id, 'days', e.target.value),
                          className: "w-full px-2 py-1 border border-gray-300 rounded focus:ring-1 focus:ring-blue-500 focus:border-transparent text-sm",
                          min: "1"
                        })
                      ),
                      React.createElement('td', { className: "px-4 py-3" },
                        React.createElement('input', {
                          type: "number",
                          step: "0.01",
                          value: line.amount,
                          onChange: (e) => updateExpenseLine(line.id, 'amount', e.target.value),
                          className: "w-full px-2 py-1 border border-gray-300 rounded focus:ring-1 focus:ring-blue-500 focus:border-transparent text-sm",
                          placeholder: "0.00"
                        })
                      ),
                      React.createElement('td', { className: "px-4 py-3 text-sm text-gray-600" }, "Meals"),
                      React.createElement('td', { className: "px-4 py-3 hidden lg:table-cell" },
                        React.createElement('input', {
                          type: "text",
                          value: line.project,
                          onChange: (e) => updateExpenseLine(line.id, 'project', e.target.value),
                          className: "w-full px-2 py-1 border border-gray-300 rounded focus:ring-1 focus:ring-blue-500 focus:border-transparent text-sm",
                          placeholder: "Project #"
                        })
                      ),
                      React.createElement('td', { className: "px-4 py-3 hidden lg:table-cell" },
                        React.createElement('input', {
                          type: "text",
                          value: line.task,
                          onChange: (e) => updateExpenseLine(line.id, 'task', e.target.value),
                          className: "w-full px-2 py-1 border border-gray-300 rounded focus:ring-1 focus:ring-blue-500 focus:border-transparent text-sm",
                          placeholder: "Task #"
                        })
                      ),
                      React.createElement('td', { className: "px-4 py-3" },
                        React.createElement('input', {
                          type: "text",
                          value: line.justification,
                          onChange: (e) => updateExpenseLine(line.id, 'justification', e.target.value),
                          className: "w-full px-2 py-1 border border-gray-300 rounded focus:ring-1 focus:ring-blue-500 focus:border-transparent text-sm",
                          placeholder: "Justification"
                        })
                      ),
                      React.createElement('td', { className: "px-4 py-3 hidden md:table-cell" },
                        React.createElement('input', {
                          type: "text",
                          value: line.additionalInfo,
                          onChange: (e) => updateExpenseLine(line.id, 'additionalInfo', e.target.value),
                          className: "w-full px-2 py-1 border border-gray-300 rounded focus:ring-1 focus:ring-blue-500 focus:border-transparent text-sm",
                          placeholder: "Additional info"
                        })
                      ),
                      React.createElement('td', { className: "px-4 py-3" },
                        React.createElement('button', {
                          onClick: () => deleteExpenseLine(line.id),
                          className: "text-red-600 hover:text-red-800 transition-colors"
                        },
                          React.createElement(Trash2, { size: 16 })
                        )
                      )
                    )
                  )
                )
              ),
              
              expenseLines.length === 0 && React.createElement('div', { className: "text-center py-12" },
                React.createElement('p', { className: "text-gray-500" }, 'No expense lines added yet. Click "Add Line" to get started.')
              )
            )
          ),

          // Actions
          React.createElement('div', { className: "bg-white rounded-xl shadow-sm border border-gray-200 mb-6" },
            React.createElement('div', { className: "px-6 py-4" },
              React.createElement('div', { className: "flex flex-wrap gap-3" },
                React.createElement('button', {
                  onClick: generateOutput,
                  className: "inline-flex items-center px-6 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors"
                },
                  React.createElement(Copy, { size: 16, className: "mr-2" }),
                  "Generate & Copy"
                ),
                
                React.createElement('button', {
                  onClick: saveDraft,
                  className: "inline-flex items-center px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors"
                },
                  React.createElement(Save, { size: 16, className: "mr-2" }),
                  "Save Draft"
                ),
                
                React.createElement('button', {
                  onClick: loadDraft,
                  disabled: !savedDraft,
                  className: "inline-flex items-center px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition-colors disabled:bg-gray-300 disabled:cursor-not-allowed"
                },
                  React.createElement(Upload, { size: 16, className: "mr-2" }),
                  "Load Draft"
                ),
                
                React.createElement('button', {
                  onClick: clearDraft,
                  disabled: !savedDraft,
                  className: "inline-flex items-center px-4 py-2 bg-orange-600 text-white rounded-lg hover:bg-orange-700 transition-colors disabled:bg-gray-300 disabled:cursor-not-allowed"
                },
                  React.createElement(RotateCcw, { size: 16, className: "mr-2" }),
                  "Clear Draft"
                ),
                
                React.createElement('button', {
                  onClick: resetForm,
                  className: "inline-flex items-center px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700 transition-colors"
                },
                  React.createElement(RotateCcw, { size: 16, className: "mr-2" }),
                  "Reset Form"
                )
              )
            )
          ),

          // Output
          showOutput && React.createElement('div', { className: "bg-white rounded-xl shadow-sm border border-gray-200" },
            React.createElement('div', { className: "px-6 py-4 border-b border-gray-200" },
              React.createElement('h3', { className: "text-lg font-semibold text-gray-900" }, "Generated Output"),
              React.createElement('p', { className: "text-sm text-gray-600" }, "Output has been copied to clipboard")
            ),
            React.createElement('div', { className: "px-6 py-4" },
              React.createElement('pre', { className: "bg-gray-50 p-4 rounded-lg text-sm overflow-x-auto whitespace-pre-wrap font-mono text-gray-800" },
                output
              )
            )
          )
        )
      );
    };

    // Render the app
    ReactDOM.render(React.createElement(ExpenseReportApp), document.getElementById('root'));
  </script>
</body>
</html>
